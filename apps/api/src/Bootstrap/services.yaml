services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Application\:
        resource: "../Application/"

    App\Adapters\:
        resource: "../Adapters/"
        exclude:
            - "../Adapters/In/Http/"

    App\Adapters\In\Http\:
        resource: "../Adapters/In/Http/"
        tags: ["controller.service_arguments"]

    App\Application\Ports\PasswordVerifier: '@App\Adapters\Out\Security\NativePasswordVerifier'
    App\Application\Ports\AuthSessionManager: '@App\Adapters\Out\Security\SymfonyAuthSessionManager'
    App\Application\Ports\AccessTokenManager: '@App\Adapters\Out\Security\JwtAccessTokenManager'
    App\Domain\Repository\UserRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineUserRepository'
    App\Domain\Repository\DesignationOfOriginRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineDesignationOfOriginRepository'
    App\Domain\Repository\GrapeRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineGrapeRepository'
    App\Domain\Repository\AwardRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineAwardRepository'
    App\Domain\Repository\ReviewStatsRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineReviewStatsRepository'
    App\Domain\Repository\StatsRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineReviewStatsRepository'
    App\Domain\Repository\WineReviewRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineWineReviewRepository'
    App\Domain\Repository\WineRepository: '@App\Adapters\Out\Persistence\Repos\DoctrineWineRepository'
    App\Domain\Repository\WinePhotoRepository: '@App\Adapters\Out\Persistence\Repos\DoctrinePhotoRepository'
    App\Application\Ports\PhotoStoragePort: '@App\Adapters\Out\Storage\LocalWinePhotoStorage'
    App\Application\Ports\WineDraftGenerator: '@App\Adapters\Out\AI\OpenAiWineDraftGenerator'

    App\Adapters\Out\Storage\LocalWinePhotoStorage:
        arguments:
            $baseDir: '/shared/public/images/wines'

    App\Adapters\Out\AI\OpenAiWineDraftGenerator:
        arguments:
            $apiKey: '%env(default::OPENAI_API_KEY)%'

    App\Adapters\Out\Storage\LocalDesignationOfOriginPhotoStorage:
        arguments:
            $doLogoDir: '/shared/public/images/icons/DO'
            $regionLogoDir: '/shared/public/images/flags/regions'

    App\Adapters\Out\Security\JwtAccessTokenManager:
        arguments:
            $secret: '%kernel.secret%'
            $ttlSeconds: 604800

    App\Application\UseCases\DesignationOfOrigin\CreateDesignationOfOriginAsset\CreateDesignationOfOriginAssetHandler:
        arguments:
            $assetStorage: '@App\Adapters\Out\Storage\LocalDesignationOfOriginPhotoStorage'

    App\Application\UseCases\DesignationOfOrigin\DeleteDesignationOfOrigin\DeleteDesignationOfOriginHandler:
        arguments:
            $assets: '@App\Adapters\Out\Storage\LocalDesignationOfOriginPhotoStorage'

    # Domain objects are pure PHP and should not be container services by default.
    App\Domain\:
        resource: "../Domain/"
        exclude:
            - "../Domain/**/Enum/"
            - "../Domain/**/Model/"
            - "../Domain/**/ValueObject/"
            - "../Domain/**/Event/"
