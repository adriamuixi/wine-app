server {
  listen 80 default_server;
  server_name tatirosset.cat www.tatirosset.cat;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name tatirosset.cat www.tatirosset.cat;
  client_max_body_size 16M;

  ssl_certificate /etc/letsencrypt/live/tatirosset.cat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tatirosset.cat/privkey.pem;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  root /var/www/html/public;
  index index.php;

  location /api {
    try_files $uri /index.php$is_args$args;
  }

  location = /guide.md {
    try_files $uri /index.php$is_args$args;
  }

  location ~ ^/index\.php(/|$) {
    fastcgi_pass api:9000;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    fastcgi_connect_timeout 15s;
    fastcgi_send_timeout 300s;
    fastcgi_read_timeout 300s;
    internal;
  }

  location ~ \.php$ { return 404; }

  location /images/ {
    alias /shared_public_images/;
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  location /images/wines/ {
    alias /shared_public_images/wines/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /admin {
    return 301 /admin/;
  }

  location /admin/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    proxy_pass http://web-private:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web-public:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
