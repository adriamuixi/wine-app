openapi: 3.1.0
info:
  title: Wine App API
  version: 0.1.0
  description: Current API endpoints for health, authentication, wines, and wine photos.
servers:
  - url: http://localhost:8080
paths:
  /api:
    get:
      summary: Health check
      operationId: getApiHealth
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: wine-api
  /guide.md:
    get:
      summary: Markdown API guide
      operationId: getApiGuideMarkdown
      tags: [System]
      responses:
        '200':
          description: Human-readable API guide in Markdown format
          content:
            text/markdown:
              schema:
                type: string
  /api/auth/login:
    post:
      summary: Login with email and password (session cookie)
      operationId: postAuthLogin
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getAuthMe
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update current authenticated user
      operationId: putAuthMe
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
      responses:
        '200':
          description: Updated authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Authenticated user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/logout:
    post:
      summary: Logout current session
      operationId: postAuthLogout
      tags: [Auth]
      responses:
        '204':
          description: Logged out (idempotent)
  /api/auth/users:
    post:
      summary: Create auth user
      operationId: postAuthUsersCreate
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete user by email
      operationId: deleteAuthUsersByEmail
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAuthUserRequest'
      responses:
        '204':
          description: User deleted
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/wines/{wineId}/reviews:
    post:
      summary: Create review
      operationId: postWineReviewsCreate
      tags: [Review]
      parameters:
        - in: path
          name: wineId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReviewResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Review already exists for this user and wine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reviews:
    get:
      summary: List reviews (paginated)
      operationId: getReviewsList
      tags: [Review]
      parameters:
        - in: query
          name: page
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: sort_by
          description: Sort field
          schema:
            type: string
            enum: [score, name, do]
            default: score
        - in: query
          name: sort_dir
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated review list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/wines/{wineId}/reviews/{id}:
    get:
      summary: Get review by id
      operationId: getWineReviewById
      tags: [Review]
      parameters:
        - in: path
          name: wineId
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Review found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update review by id
      operationId: putWineReviewById
      tags: [Review]
      parameters:
        - in: path
          name: wineId
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '204':
          description: Review updated
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (review owned by another user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete review by id
      operationId: deleteWineReviewById
      tags: [Review]
      parameters:
        - in: path
          name: wineId
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Review deleted
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (review owned by another user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/stats/reviews-per-monh:
    get:
      summary: Get monthly review count and median score series
      operationId: getStatsReviewsPerMonh
      tags: [Stats]
      responses:
        '200':
          description: Monthly review statistics ordered chronologically
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewsPerMonthStatsResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/stats/generic:
    get:
      summary: Get generic dashboard stats
      operationId: getStatsGeneric
      tags: [Stats]
      responses:
        '200':
          description: Generic dashboard KPI stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatsResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/stats/socring-generic:
    get:
      summary: Get generic score bucket stats
      operationId: getStatsSocringGeneric
      tags: [Stats]
      responses:
        '200':
          description: Score bucket distribution for catalog quality panel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringGenericStatsResponse'
  /api/grapes:
    get:
      summary: List all grapes
      operationId: getGrapesList
      tags: [Grape]
      responses:
        '200':
          description: Grapes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrapeListResponse'
  /api/dos:
    post:
      summary: Create denomination of origin
      operationId: postDo
      tags: [DO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDoRequest'
      responses:
        '201':
          description: DO created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDoResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: DO already exists for the same country and name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List all denominations of origin
      operationId: getDosList
      tags: [DO]
      parameters:
        - in: query
          name: name
          description: Filter by DO name (case-insensitive contains)
          schema:
            type: string
        - in: query
          name: country
          description: Filter by country
          schema:
            type: string
            enum: [spain, france, italy, portugal, germany, argentina, chile, united_states, south_africa, australia]
        - in: query
          name: region
          description: Filter by DO region (case-insensitive contains)
          schema:
            type: string
        - in: query
          name: user_ids
          description: >
            Comma-separated user IDs. Returns only DOs where, within the same DO, at least one wine has been reviewed by every specified user.
          schema:
            type: string
            example: '1,2'
        - in: query
          name: sort_by_1
          description: Primary sort field. Allowed values are `country`, `region`, `name`.
          schema:
            type: string
            enum: [country, region, name]
            default: country
        - in: query
          name: sort_by_2
          description: Secondary sort field. Allowed values are `country`, `region`, `name`.
          schema:
            type: string
            enum: [country, region, name]
            default: region
        - in: query
          name: sort_by_3
          description: Tertiary sort field. Allowed values are `country`, `region`, `name`.
          schema:
            type: string
            enum: [country, region, name]
            default: name
      responses:
        '200':
          description: Denominations of origin list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dos/{id}:
    put:
      summary: Partially update denomination of origin by id
      operationId: putDoById
      tags: [DO]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDoRequest'
      responses:
        '204':
          description: DO updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: DO not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete denomination of origin by id
      operationId: deleteDoById
      tags: [DO]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: DO deleted successfully
        '404':
          description: DO not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: DO has associated wines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/dos/{id}/assets:
    post:
      summary: Upload DO asset
      operationId: postDoAssetById
      tags: [DO]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type:
                  type: string
                  enum: [do_logo, region_logo]
                file:
                  type: string
                  format: binary
                  description: Image file. Allowed extensions are `jpg`, `jpeg`, `png`, `webp`, `gif`, `avif`.
      responses:
        '201':
          description: DO asset uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDoAssetResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: DO not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/wines:
    get:
      summary: List wines (paginated)
      operationId: getWinesList
      tags: [Wine]
      parameters:
        - in: query
          name: page
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: search
          description: Search by wine name, winery, DO name, or region
          schema:
            type: string
        - in: query
          name: wine_type
          schema:
            type: string
            enum: [red, white, rose, sparkling, sweet, fortified]
        - in: query
          name: country
          schema:
            type: string
            enum: [spain, france, italy, portugal, germany, argentina, chile, united_states, south_africa, australia]
        - in: query
          name: do_id
          description: Region/DO identifier
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: grape_id
          description: Grape variety identifier
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: score_min
          description: Minimum average review score (0..100)
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - in: query
          name: score_max
          description: Maximum average review score (0..100)
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - in: query
          name: score_bucket
          description: Preset score range for quick filters
          schema:
            type: string
            enum: [any, lt70, 70_80, 80_90, 90_plus]
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [created_at, updated_at, name, vintage_year, score]
            default: created_at
        - in: query
          name: sort_dir
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated wine list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineListResponse'
        '400':
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create wine
      operationId: postWinesCreate
      tags: [Wine]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWineRequest'
      responses:
        '201':
          description: Wine created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWineResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Foreign key reference not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/wines/{id}:
    get:
      summary: Get wine details by id
      operationId: getWineById
      tags: [Wine]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Wine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineDetailsResponse'
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Partially update wine by id
      operationId: putWineById
      tags: [Wine]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWineRequest'
      responses:
        '204':
          description: Wine updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Wine or reference not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete wine by id
      operationId: deleteWineById
      tags: [Wine]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Wine deleted successfully
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/wines/{id}/photos:
    post:
      summary: Upload or replace a wine photo by type
      operationId: postWinePhotoByWineId
      tags: [Wine]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type:
                  type: string
                  enum: [front_label, back_label, bottle, situation]
                file:
                  type: string
                  format: binary
                  description: Image file. Allowed extensions are `jpg`, `jpeg`, `png`, `webp`, `gif`, `avif`.
      responses:
        '201':
          description: Photo created or replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWinePhotoResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: adriamuixi@gmail.com
        password:
          type: string
          format: password
          example: wine1234
    CreateAuthUserRequest:
      type: object
      required: [email, name, lastname, password]
      properties:
        email:
          type: string
          format: email
          example: adriamuixi@gmail.com
        name:
          type: string
          example: Adria
        lastname:
          type: string
          example: Muixi
        password:
          type: string
          format: password
          example: wine1234
    DeleteAuthUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: adriamuixi@gmail.com
    UpdateCurrentUserRequest:
      type: object
      required: [name, lastname]
      properties:
        name:
          type: string
          example: Adria
        lastname:
          type: string
          example: Muixi
        password:
          type: string
          nullable: true
          format: password
          example: newSecret123
    AuthUser:
      type: object
      required: [id, email, name, lastname]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: adriamuixi@gmail.com
        name:
          type: string
          example: Adria
        lastname:
          type: string
          example: Muixi
    AuthUserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Invalid credentials.
    ReviewBulletValue:
      type: string
      enum: [fruity, floral, mineral, oak_forward, powerful]
    Review:
      type: object
      required: [id, user_id, wine_id, aroma, appearance, palate_entry, body, persistence, bullets]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        wine_id:
          type: integer
          format: int64
        score:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
        aroma:
          type: integer
          minimum: 0
          maximum: 10
        appearance:
          type: integer
          minimum: 0
          maximum: 10
        palate_entry:
          type: integer
          minimum: 0
          maximum: 10
        body:
          type: integer
          minimum: 0
          maximum: 10
        persistence:
          type: integer
          minimum: 0
          maximum: 10
        bullets:
          type: array
          items:
            $ref: '#/components/schemas/ReviewBulletValue'
        created_at:
          type: string
          format: date-time
          nullable: true
    CreateReviewRequest:
      type: object
      required: [aroma, appearance, palate_entry, body, persistence]
      properties:
        created_at:
          type: string
          nullable: true
          description: Review date. Accepts `YYYY-MM-DD` or ISO-8601 date-time.
          example: '2025-12-24'
        score:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
        aroma:
          type: integer
          minimum: 0
          maximum: 10
        appearance:
          type: integer
          minimum: 0
          maximum: 10
        palate_entry:
          type: integer
          minimum: 0
          maximum: 10
        body:
          type: integer
          minimum: 0
          maximum: 10
        persistence:
