name: ci

on:
  pull_request:
  push:
    branches: [master, mobileapp]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-
      - name: Install API dependencies
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist
      - name: Run API unit tests
        working-directory: apps/api
        run: php vendor/bin/phpunit --testsuite Unit

  web-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web-public, web-private]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
        working-directory: apps/${{ matrix.app }}
      - name: Build
        run: npm run build
        working-directory: apps/${{ matrix.app }}

  shared-and-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Package type checks
        run: npm run packages:check
      - name: Mobile lint
        run: npm run mobile:lint
      - name: Mobile typecheck
        run: npm run mobile:typecheck
      - name: Mobile tests
        run: npm run mobile:test
