name: ci

on:
  pull_request:
  push:
    branches: [master, mobileapp]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Run API unit tests
        working-directory: apps/api
        run: |
          if [ -f vendor/bin/phpunit ]; then
            php vendor/bin/phpunit --testsuite Unit
          else
            echo "Skipping phpunit because vendor is not installed in CI image"
          fi

  web-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web-public, web-private]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.app }}
      - name: Lint
        run: npm run lint
        working-directory: apps/${{ matrix.app }}
      - name: Build
        run: npm run build
        working-directory: apps/${{ matrix.app }}

  shared-and-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install web-public deps for TypeScript binary reuse
        run: npm ci
        working-directory: apps/web-public
      - name: Package type checks
        run: npm run packages:check
      - name: API client type checks
        run: npm run api-client:check
      - name: Mobile typecheck (placeholder until deps are installed in workspace root)
        run: |
          if [ -f apps/mobile/package.json ]; then
            echo "Mobile package detected. Install + typecheck handled in dedicated mobile workflow."
          fi
